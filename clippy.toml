# Workspace clippy configuration.
# The arithmetic-overflow safety lint (clippy::arithmetic_side_effects) is enabled
# crate-locally in the integer-math crate via #![deny(...)], not here.
# MSRV matches the workspace `rust-version` (1.84) — the floor the build-sbf platform-tools
# toolchain enforces — so clippy never suggests an API unavailable in the on-chain build.
msrv = "1.84"
# Flag any accidental hard-coded pubkey/secret-looking literals during review.
disallowed-methods = []
